# API 키는 환경변수 ANTHROPIC_API_KEY 로 주입
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.model=claude-sonnet-4-5

server.port=8080
spring.application.name=spring-ai-demo

# 대화 메모리 영속화 — H2 "파일" 모드라 앱을 재시작해도 대화가 남는다.
# (인메모리로 두면 재시작 시 사라져 영속화를 보여주는 의미가 없다)
spring.datasource.url=jdbc:h2:file:./data/chatmemory
spring.ai.chat.memory.repository.jdbc.initialize-schema=always

# MCP 서버 — @McpTool 도구를 MCP 프로토콜로 노출
spring.ai.mcp.server.name=spring-ai-demo-mcp
spring.ai.mcp.server.protocol=STREAMABLE
