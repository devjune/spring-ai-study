# API 키는 환경변수 ANTHROPIC_API_KEY 로 주입
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.model=claude-sonnet-4-5

server.port=8080
spring.application.name=spring-ai-demo

# 대화 메모리 영속화 — H2 "파일" 모드라 앱을 재시작해도 대화가 남는다.
# (인메모리로 두면 재시작 시 사라져 영속화를 보여주는 의미가 없다)
spring.datasource.url=jdbc:h2:file:./data/chatmemory
spring.ai.chat.memory.repository.jdbc.initialize-schema=always

# H2 웹 콘솔 — http://localhost:8080/h2-console
# 접속 시 User Name 을 비워야 한다(이유는 docs/study-log.md).
# SELECT * FROM SPRING_AI_CHAT_MEMORY ORDER BY conversation_id, sequence_id
spring.h2.console.enabled=true

# 관측성(9번 데모) — 모델에 나간 프롬프트 전문과 응답 원문을 INFO 로 찍는다.
# RAG 가 끼워넣은 검색 문서, 메모리가 붙인 과거 대화가 프롬프트에서 그대로 보인다.
# 전제: ObservationRegistry 빈(actuator). 없으면 NOOP 폴백이라 조용히 아무것도 안 나온다.
# 민감정보가 로그에 남으므로 운영에서는 켜지 않는다.
spring.ai.chat.observations.log-prompt=true
spring.ai.chat.observations.log-completion=true

# 토큰 사용량 지표 노출 — /actuator/metrics/gen_ai.client.token.usage
management.endpoints.web.exposure.include=health,metrics

# MCP 서버 — @McpTool 도구를 MCP 프로토콜로 노출
spring.ai.mcp.server.name=spring-ai-demo-mcp
spring.ai.mcp.server.protocol=STREAMABLE
